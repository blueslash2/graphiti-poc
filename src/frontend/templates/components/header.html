                          d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
            
            <!-- 企业Logo -->

                     alt="{{ company_name | default('企业Logo') }}"

                <!-- 分隔线 -->
                <div class="h-6 w-px bg-border"></div>
                
                <!-- 项目Logo和名称 -->
                <img src="/static/images/logo-project.png"
                     alt="{{ project_name | default('项目Logo') }}"
                     class="h-6 w-auto"
                     onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjQiIGhlaWdodD0iMjQiIHZpZXdCb3g9IjAgMCAyNCAyNCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPGNpcmNsZSBjeD0iMTIiIGN5PSIxMiIgcj0iMTAiIGZpbGw9IiMzMzk5ZmYiLz4KPHRleHQgeD0iMTIiIHk9IjE2IiBmb250LWZhbWx5PSJBcmlhbCIgZm9udC1zaXplPSI4IiBmaWxsPSJ3aGl0ZSIgdGV4dC1hbmNob3I9Im1pZGRsZSI+RzwvdGV4dD4KPC9zdmc+Cg=='">
                
                <div class="hidden sm:block">
                    <h1 class="text-lg font-semibold text-text" data-i18n="header.project_logo_alt">Graphiti 知识图谱</h1>
                    <p class="text-xs text-text-secondary" data-i18n="dashboard.subtitle">智能化知识管理与图谱构建平台</p>
                </div>
            </div>
        </div>
        
        <!-- 中间：搜索框（可选） -->
        <div class="flex-1 max-w-md mx-4 hidden lg:block">
            <div class="relative">
                <input type="text" 
                       placeholder="快速搜索知识图谱..." 
                       class="w-full pl-10 pr-4 py-2 text-sm border border-border rounded-lg 
                              bg-surface text-text placeholder-text-secondary
                              focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary"
                       id="header-search">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-4 h-4 text-text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>
        </div>
        
        <!-- 右侧：功能按钮 -->
        <div class="flex items-center space-x-2">
            
            <!-- 主题切换 -->
            <div class="relative group">
                <button type="button" 
                        class="p-2 rounded-md text-text-secondary hover:text-text hover:bg-surface 
                               transition-colors"
                        data-theme-toggle
                        title="切换主题">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                </button>
                
                <!-- 主题选择下拉菜单 -->
                <div class="absolute right-0 top-full mt-2 w-48 bg-surface-elevated rounded-lg 
                           shadow-lg border border-border hidden group-hover:block">
                    <div class="p-2">
                        <button type="button" 
                                class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-surface 
                                       transition-colors"
                                onclick="window.themeManager.setTheme('light')">
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>
                                </svg>
                                亮色主题
                            </span>
                        </button>
                        <button type="button" 
                                class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-surface 
                                       transition-colors"
                                onclick="window.themeManager.setTheme('dark')">
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                                </svg>
                                暗色主题
                            </span>
                        </button>
                        <button type="button" 
                                class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-surface 
                                       transition-colors"
                                onclick="window.themeManager.setTheme('auto')">
                            <span class="flex items-center">
                                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                          d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                                </svg>
                                跟随系统
                            </span>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 语言切换 -->
            <div class="relative group">
                <button type="button" 
                        class="p-2 rounded-md text-text-secondary hover:text-text hover:bg-surface 
                               transition-colors"
                        title="切换语言">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.769 7.459 11 10.188 11 13a8.001 8.001 0 018 8h-8V5z"></path>
                    </svg>
                </button>
                
                <!-- 语言选择下拉菜单 -->
                <div class="absolute right-0 top-full mt-2 w-32 bg-surface-elevated rounded-lg 
                           shadow-lg border border-border hidden group-hover:block">
                    <div class="p-2">
                        <button type="button" 
                                class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-surface 
                                       transition-colors"
                                onclick="window.i18n.setLanguage('zh-CN')">
                            简体中文
                        </button>
                        <button type="button" 
                                class="w-full text-left px-3 py-2 text-sm rounded-md hover:bg-surface 
                                       transition-colors"
                                onclick="window.i18n.setLanguage('en-US')">
                            English
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- 系统状态指示器 -->
            <div class="relative group">
                <div class="flex items-center space-x-2">
                    <div id="system-health-indicator" 
                         class="w-3 h-3 rounded-full bg-success"
                         title="系统状态：正常">
                    </div>
                    <span class="text-xs text-text-secondary hidden sm:inline">系统正常</span>
                </div>
            </div>
            
            <!-- 用户菜单（预留） -->
            <div class="relative group">
                <button type="button" 
                        class="flex items-center space-x-2 p-2 rounded-md text-text-secondary 
                               hover:text-text hover:bg-surface transition-colors"
                        title="用户菜单">
                    <div class="w-8 h-8 bg-primary/10 rounded-full flex items-center justify-center">
                        <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                  d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                    <span class="hidden md:inline text-sm font-medium">用户</span>
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                              d="M19 9l-7 7-7-7"></path>
                    </svg>
                </button>
                
                <!-- 用户菜单下拉 -->
                <div class="absolute right-0 top-full mt-2 w-48 bg-surface-elevated rounded-lg 
                           shadow-lg border border-border hidden group-hover:block">
                    <div class="p-2">
                        <div class="px-3 py-2 text-sm text-text-secondary border-b border-border">
                            <div class="font-medium">当前用户</div>
                            <div class="text-xs">user@company.com</div>
                        </div>
                        <a href="#" class="block px-3 py-2 text-sm rounded-md hover:bg-surface transition-colors">
                            个人设置
                        </a>
                        <a href="#" class="block px-3 py-2 text-sm rounded-md hover:bg-surface transition-colors">
                            系统设置
                        </a>
                        <hr class="my-1 border-border">
                        <a href="#" class="block px-3 py-2 text-sm rounded-md hover:bg-surface transition-colors text-error">
                            退出登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<!-- 顶部导航栏样式 -->
<style>
/* 导航栏特定样式 */
.header-shadow {
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
}

[data-theme="dark"] .header-shadow {
    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.3), 0 1px 2px 0 rgba(0, 0, 0, 0.2);
}

/* 下拉菜单动画 */
.group:hover .group-hover\:block {
    display: block;
    animation: dropdownFadeIn 0.2s ease-out;
}

@keyframes dropdownFadeIn {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 响应式调整 */
@media (max-width: 767px) {
    .header-logo-text {
        display: none;
    }
}
</style>

<!-- 头部导航栏JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // 头部搜索功能
    const headerSearch = document.getElementById('header-search');
    if (headerSearch) {
        headerSearch.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                const query = this.value.trim();
                if (query) {
                    // 导航到搜索页面
                    window.location.href = '/search?query=' + encodeURIComponent(query);
                }
            }
        });
    }
    
    // 系统健康检查
    function checkSystemHealth() {
        if (window.api && window.api.healthCheck) {
            window.api.healthCheck()
                .then(health => {
                    const indicator = document.getElementById('system-health-indicator');
                    if (indicator) {
                        const isHealthy = health.status === 'healthy';
                        indicator.className = `w-3 h-3 rounded-full ${
                            isHealthy ? 'bg-success' : 'bg-error'
                        }`;
                        indicator.title = isHealthy ? '系统正常' : '系统异常';
                    }
                })
                .catch(error => {
                    console.error('系统健康检查失败:', error);
                    const indicator = document.getElementById('system-health-indicator');
                    if (indicator) {
                        indicator.className = 'w-3 h-3 rounded-full bg-error';
                        indicator.title = '系统异常';
                    }
                });
        }
    }
    
    // 定期检查系统健康状态
    checkSystemHealth();
    setInterval(checkSystemHealth, 30000); // 每30秒检查一次
});
</script>
