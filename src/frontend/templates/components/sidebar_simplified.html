<!-- 简化侧边栏样式和脚本 -->
<style>
/* 侧边栏基础样式 */
#sidebar {
    transition: all 0.3s ease-in-out;
    position: relative;
}

/* 展开状态 */
#sidebar.expanded {
    width: 256px; /* 64 * 4rem */
}

/* 收起状态 */
#sidebar.collapsed {
    width: 64px;  /* 16 * 4rem */
}

/* 收起状态时隐藏文字内容 */
#sidebar.collapsed .sidebar-text {
    display: none;
}

/* 收起状态时导航项调整 */
#sidebar.collapsed .nav-item {
    justify-content: center;
    padding-left: 1rem;
    padding-right: 1rem;
}

/* 收起状态时底部按钮调整 */
#sidebar.collapsed .sidebar-toggle {
    transform: rotate(180deg);
}

/* 导航项样式 */
.nav-item {
    display: flex;
    align-items: center;
    padding: 0.75rem 1rem;
    border-radius: 0.5rem;
    color: var(--color-text-secondary);
    text-decoration: none;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
}

.nav-item:hover {
    background-color: var(--color-surface);
    color: var(--color-text);
    transform: translateX(2px);
}

.nav-item.active {
    background-color: var(--color-primary-light);
    color: var(--color-primary);
}

.nav-item.active::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background-color: var(--color-primary);
}

.nav-item-icon {
    width: 1.25rem;
    height: 1.25rem;
    margin-right: 0.75rem;
    flex-shrink: 0;
}

/* 收起状态时的工具提示 */
#sidebar.collapsed .nav-item[title]:hover::after {
    content: attr(title);
    position: absolute;
    left: 100%;
    top: 50%;
    transform: translateY(-50%);
    background-color: var(--color-surface-elevated);
    color: var(--color-text);
    padding: 0.25rem 0.5rem;
    border-radius: 0.25rem;
    font-size: 0.75rem;
    white-space: nowrap;
    margin-left: 0.5rem;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    z-index: 1000;
}

/* 响应式调整 */
@media (max-width: 767px) {
    #sidebar {
        width: 256px !important;
    }
    
    #sidebar.collapsed {
        transform: translateX(-100%);
    }
    
    #sidebar.expanded {
        transform: translateX(0);
    }
}

/* 暗色主题支持 */
[data-theme="dark"] #sidebar {
    background-color: var(--color-surface-dark);
}

/* 滚动条样式 */
#sidebar ::-webkit-scrollbar {
    width: 4px;
}

#sidebar ::-webkit-scrollbar-track {
    background: transparent;
}

#sidebar ::-webkit-scrollbar-thumb {
    background-color: var(--color-border);
    border-radius: 2px;
}
</style>

<script>
// 侧边栏状态管理（保持与之前相同的功能）
let sidebarState = {
    isExpanded: true,
    isCollapsedByUser: false
};

// 初始化侧边栏
function initSidebar() {
    const sidebar = document.getElementById('sidebar');
    const savedState = localStorage.getItem('sidebar-expanded');
    
    // 恢复保存的状态
    if (savedState !== null) {
        sidebarState.isExpanded = savedState === 'true';
    } else {
        // 默认展开，但根据屏幕大小调整
        sidebarState.isExpanded = window.innerWidth >= 768;
    }
    
    updateSidebarState();
    
    // 监听窗口大小变化
    window.addEventListener('resize', handleResize);
}

// 切换侧边栏展开/收起
function toggleSidebar() {
    sidebarState.isExpanded = !sidebarState.isExpanded;
    sidebarState.isCollapsedByUser = true;
    updateSidebarState();
    localStorage.setItem('sidebar-expanded', sidebarState.isExpanded);
}

// 更新侧边栏状态
function updateSidebarState() {
    const sidebar = document.getElementById('sidebar');
    const content = document.querySelector('.layout-content');
    
    if (!sidebar || !content) {
        console.error('侧边栏或内容区域元素未找到');
        return;
    }
    
    if (sidebarState.isExpanded) {
        sidebar.classList.remove('collapsed');
        sidebar.classList.add('expanded');
        sidebar.style.width = '256px';
        sidebar.style.transform = 'translateX(0)';
        content.style.marginLeft = '256px';
    } else {
        sidebar.classList.remove('expanded');
        sidebar.classList.add('collapsed');
        if (window.innerWidth >= 768) {
            // 桌面端收起时缩小宽度
            sidebar.style.width = '64px';
            content.style.marginLeft = '64px';
        } else {
            // 移动端收起时完全隐藏
            sidebar.style.transform = 'translateX(-100%)';
            content.style.marginLeft = '0';
        }
    }
}

// 处理窗口大小变化
function handleResize() {
    if (window.innerWidth < 768) {
        // 移动端强制展开状态
        sidebarState.isExpanded = true;
        updateSidebarState();
    } else if (!sidebarState.isCollapsedByUser) {
        // 桌面端且用户未手动收起，保持展开
        sidebarState.isExpanded = true;
        updateSidebarState();
    }
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    initSidebar();
});

// 导航链接点击处理（保持原有功能）
document.addEventListener('DOMContentLoaded', function() {
    const navLinks = document.querySelectorAll('[data-nav-link]');
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            // 更新活动状态
            navLinks.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            
            // 移动端自动关闭侧边栏
            if (window.innerWidth < 768) {
                window.app.toggleSidebar();
            }
        });
    });
});
</script>
