<!-- 顶部通栏样式 - 适配新布局系统 -->
<style>
/* 顶部通栏样式 - 现在由布局系统控制定位 */
.header-content {
    height: 100%;
    display: flex;
    align-items: center;
    padding: 0 1rem;
}

/* 下拉菜单动画 */
.group:hover .group-hover\:block {
    display: block;
    animation: dropdownFadeInTop 0.2s ease-out;
}

@keyframes dropdownFadeInTop {
    from {
        opacity: 0;
        transform: translateY(-10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* 小按钮悬停效果 */
button[data-theme-toggle]:hover,
button[title="切换语言"]:hover {
    background-color: var(--color-surface);
}

/* 响应式调整 - 适配新布局系统 */
@media (max-width: 767px) {
    .header-content {
        padding: 0 0.75rem;
    }
    
    /* 移动端隐藏项目名称 */
    .header-content h1 {
        font-size: 1rem;
    }
    
    /* 移动端调整按钮大小 */
    .header-content button[data-theme-toggle],
    .header-content button[title="切换语言"] {
        padding: 0.5rem;
    }
    
    .header-content button svg {
        width: 1rem;
        height: 1rem;
    }
}
</style>

<script>
// 顶部通栏JavaScript功能 - 适配新布局系统
document.addEventListener('DOMContentLoaded', function() {
    
    // 主题切换功能（保持与原有主题管理器兼容）
    const themeButtons = document.querySelectorAll('[data-theme-toggle]');
    themeButtons.forEach(button => {
        button.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    });
    
    // 语言切换功能（保持与原有i18n管理器兼容）
    const langButtons = document.querySelectorAll('button[title="切换语言"]');
    langButtons.forEach(button => {
        button.addEventListener('click', function(e) {
            e.stopPropagation();
        });
    });
    
    // 点击外部关闭下拉菜单
    document.addEventListener('click', function(e) {
        const dropdowns = document.querySelectorAll('.group-hover\\:block');
        dropdowns.forEach(dropdown => {
            if (!dropdown.parentElement.contains(e.target)) {
                dropdown.style.display = 'none';
            }
        });
    });
    
    // 重新打开下拉菜单
    const groups = document.querySelectorAll('.group');
    groups.forEach(group => {
        const button = group.querySelector('button');
        const dropdown = group.querySelector('.group-hover\\:block');
        
        if (button && dropdown) {
            button.addEventListener('mouseenter', function() {
                dropdown.style.display = 'block';
            });
        }
    });
});
</script>
