<!-- 侧边栏样式和脚本 -->
<style>
/* 侧边栏滚动条样式 */
#sidebar::-webkit-scrollbar {
    width: 4px;
}

#sidebar::-webkit-scrollbar-track {
    background: transparent;
}

#sidebar::-webkit-scrollbar-thumb {
    background: var(--color-border);
    border-radius: 2px;
}

#sidebar::-webkit-scrollbar-thumb:hover {
    background: var(--color-border-dark);
}

/* 导航项动画 */
.nav-item {
    position: relative;
    transition: all 0.2s ease;
}

.nav-item::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: var(--color-primary);
    transform: scaleY(0);
    transition: transform 0.2s ease;
}

.nav-item.active::before {
    transform: scaleY(1);
}

.nav-item:hover {
    transform: translateX(2px);
}

/* 响应式侧边栏 */
@media (max-width: 767px) {
    #sidebar {
        backdrop-filter: blur(10px);
        background: rgba(255, 255, 255, 0.95);
    }
    
    [data-theme="dark"] #sidebar {
        background: rgba(15, 23, 42, 0.95);
    }
}

/* 侧边栏动画 */
#sidebar {
    transition: transform 0.3s ease-in-out;
}

#sidebar:not(.hidden) {
    transform: translateX(0);
}
</style>

<script>
document.addEventListener('DOMContentLoaded', function() {
    // 侧边栏导航链接点击处理
    const navLinks = document.querySelectorAll('[data-nav-link]');
    navLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            // 更新活动状态
            navLinks.forEach(l => l.classList.remove('active'));
            this.classList.add('active');
            
            // 移动端自动关闭侧边栏
            if (window.innerWidth < 768) {
                window.app.toggleSidebar();
            }
        });
    });
    
    // 系统健康状态同步
    function syncHealthStatus() {
        const mainIndicator = document.getElementById('system-health-indicator');
        const sidebarIndicator = document.getElementById('sidebar-health-indicator');
        
        if (mainIndicator && sidebarIndicator) {
            // 同步样式
            sidebarIndicator.className = mainIndicator.className;
            sidebarIndicator.title = mainIndicator.title;
            
            // 更新文本
            const statusText = sidebarIndicator.nextElementSibling;
            if (statusText) {
                statusText.textContent = mainIndicator.title.includes('正常') ? '正常' : '异常';
                statusText.className = mainIndicator.title.includes('正常') ? 'text-success' : 'text-error';
            }
        }
    }
    
    // 定期检查健康状态
    setInterval(syncHealthStatus, 5000);
    
    // 初始同步
    syncHealthStatus();
});
</script>
